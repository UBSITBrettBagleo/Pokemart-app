<h1>Kanto Region</h1>

@for (pokemon of pokemonService.kantoPokemon(); track pokemon.name) {

<div class="card">

  <img [src]="pokemon.image" width="150">

  <h3>{{ pokemon.name }}</h3>

  <p>Type: {{ pokemon.type }}</p>

  <p>Held Item: {{ pokemon.heldItem }}</p>

  <p>{{ pokemon.description }}</p>

</div>

}
