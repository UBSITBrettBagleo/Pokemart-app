<h1 class="page-title">Kanto Pokémon</h1>

<div class="pokemon-container">

@for (pokemon of pokemonService.kantoPokemon(); track pokemon.name) {

<div class="pokemon-card">

<img [src]="pokemon.image">

<h3>{{ pokemon.name }}</h3>

<p><strong>Type:</strong> {{ pokemon.type }}</p>

<p><strong>Held Item:</strong> {{ pokemon.heldItem }}</p>

<p>{{ pokemon.description }}</p>

</div>

}

</div>
