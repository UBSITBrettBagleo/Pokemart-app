<h1 class="page-title">🛒 PokéMart</h1>

<div class="pokemon-container">

  @for(item of pokemartService.items(); track item.name){

  <div class="pokemon-card">

    <h3>{{item.name}}</h3>

    <p>Price: ₱{{item.price}}</p>

    <button
      (click)="pokemartService.addToCart(item)">
      Add to Cart
    </button>

  </div>

  }

</div>

<div class="pokemon-card" style="margin:20px auto; max-width:350px;">

  <h2>Shopping Cart</h2>

  @for(cartItem of pokemartService.cart(); track $index){

  <p>
    {{cartItem.name}}
    - ₱{{cartItem.price}}
  </p>

  } @empty {

  <p>Cart Empty</p>

  }

  <hr>

  <h3>
    Total: ₱{{ pokemartService.totalPrice() }}
  </h3>

  <button
    (click)="pokemartService.clearCart()">
    Checkout
  </button>

</div>
