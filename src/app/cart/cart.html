<div class="pokemon-card" style="margin:20px auto; width:350px;">

    <h2>Shopping Cart</h2>
    
    @for (item of pokemartService.cart(); track $index) {
    
    <p>{{ item.name }} - ₱{{ item.price }}</p>
    
    } @empty {
    
    <p>Cart is Empty</p>
    
    }
    
    <hr>
    
    <h3>Total: ₱{{ pokemartService.totalPrice() }}</h3>
    
    <button (click)="pokemartService.clearCart()">
    Checkout
    </button>
    
    </div>
